name: Issue Triage Agent

on:
  issues:
    types: [opened, reopened]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run?"
        default: "false"
      issue_number:
        description: "Single issue number (blank = all)"

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install anthropic PyGithub

      - name: Triage single issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN:      ${{ secrets.GH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPO:       ${{ github.repository }}
        run: python src/triage.py --issue ${{ github.event.issue.number }}

      - name: Triage batch
        if: github.event_name != 'issues'
        env:
          GH_TOKEN:      ${{ secrets.GH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPO:       ${{ github.repository }}
        run: |
          ARGS="--max 50"
          [ "${{ github.event.inputs.issue_number }}" != "" ] && ARGS="--issue ${{ github.event.inputs.issue_number }}"
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          python src/triage.py $ARGS

