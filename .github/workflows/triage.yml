name: Issue Triage Agent

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run? (true/false)"
        default: "false"
      repo:
        description: "Single repo e.g. user/repo (blank = all)"

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install PyGithub groq
      - name: Run triage agent
        env:
          GH_TOKEN:       ${{ secrets.GH_TOKEN }}
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
        run: |
          ARGS=""
          [ "${{ github.event.inputs.repo }}" != "" ] && ARGS="--repo ${{ github.event.inputs.repo }}"
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          python src/triage.py $ARGS