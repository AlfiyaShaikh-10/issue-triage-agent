name: Issue Triage Agent

on:
  schedule:
    - cron: "0 */6 * * *"   # har 6 ghante
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run? (true/false)"
        default: "false"
      repo:
        description: "Single repo (blank = all repos)"

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install PyGithub google-generativeai

      - name: Run triage agent
        env:
          GH_TOKEN:        ${{ secrets.GH_TOKEN }}
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
        run: |
          ARGS=""
          [ "${{ github.event.inputs.repo }}" != "" ] && ARGS="--repo ${{ github.event.inputs.repo }}"
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          python src/triage.py $ARGS